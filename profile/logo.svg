<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AbpGenerator logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="cell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="128" y="120" width="256" height="272" rx="28"/>
    </clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1E1B4B" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- app card silhouette + shadow -->
  <rect x="128" y="120" width="256" height="272" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- card contents (clipped to rounded card) -->
  <g clip-path="url(#cardClip)">
    <!-- header bar -->
    <rect x="128" y="120" width="256" height="58" fill="#EEF0FE"/>
    <circle cx="160" cy="149" r="6.5" fill="#C4B5FD"/>
    <circle cx="183" cy="149" r="6.5" fill="#C4B5FD"/>
    <circle cx="206" cy="149" r="6.5" fill="#C4B5FD"/>

    <!-- data grid: 2 cols x 3 rows (highlighted cells = generated) -->
    <rect x="156" y="200" width="90" height="44" rx="11" fill="url(#cell)"/>
    <rect x="266" y="200" width="90" height="44" rx="11" fill="#E0E3FB"/>
    <rect x="156" y="260" width="90" height="44" rx="11" fill="#E0E3FB"/>
    <rect x="266" y="260" width="90" height="44" rx="11" fill="url(#cell)"/>
    <rect x="156" y="320" width="90" height="44" rx="11" fill="url(#cell)"/>
    <rect x="266" y="320" width="90" height="44" rx="11" fill="#E0E3FB"/>
  </g>

  <!-- sparkle = auto-generation -->
  <g transform="translate(384,122)">
    <circle r="50" fill="#FBBF24" opacity="0.16"/>
    <path d="M0 -36 C5 -11 11 -5 36 0 C11 5 5 11 0 36 C-5 11 -11 5 -36 0 C-11 -5 -5 -11 0 -36 Z" fill="#FBBF24"/>
    <path d="M0 -16 C2.5 -5 5 -2.5 16 0 C5 2.5 2.5 5 0 16 C-2.5 5 -5 2.5 -16 0 C-5 -2.5 -2.5 -5 0 -16 Z" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
